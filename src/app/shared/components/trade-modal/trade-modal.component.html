@if (open) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in"
    (click)="close()">

    <!-- Panel -->
    <div class="w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-modal animate-slide-up"
      (click)="$event.stopPropagation()">

      <!-- Header with mode tabs -->
      <div class="flex items-center justify-between gap-3 px-5 py-4 border-b border-slate-100 dark:border-slate-700">
        <div class="flex items-center p-1 gap-1 bg-slate-100 dark:bg-slate-700 rounded-xl">
          <button
            class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all"
            [class]="activeMode === 'buy' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'"
            (click)="setMode('buy')">Comprar</button>
          <button
            class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all"
            [class]="activeMode === 'sell' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'"
            (click)="setMode('sell')">Vender</button>
        </div>
        <button class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
          (click)="close()">
          <i class="bi bi-x-lg text-sm"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="p-5 space-y-4">

        <!-- Balance info -->
        <div class="flex items-center justify-between px-3 py-2 rounded-xl bg-slate-50 dark:bg-slate-700/50">
          <span class="text-xs text-slate-500">Saldo disponível</span>
          <span class="text-sm font-bold text-slate-700 dark:text-slate-200">{{ balance | currencyFmt:0 }}</span>
        </div>

        <!-- Ticker input -->
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">
            Ticker <span class="text-red-400">*</span>
          </label>
          <input
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border border-transparent focus:border-brand-500 text-sm font-extrabold tracking-widest text-slate-800 dark:text-slate-100 placeholder-slate-400 outline-none uppercase transition-all"
            placeholder="Ex: AAPL"
            [(ngModel)]="ticker"
            [disabled]="loading" />
        </div>

        <!-- Quantity -->
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">
            Quantidade <span class="text-red-400">*</span>
          </label>
          <input
            type="number"
            min="1"
            step="1"
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border border-transparent focus:border-brand-500 text-sm font-bold text-slate-800 dark:text-slate-100 outline-none transition-all"
            [(ngModel)]="quantity"
            [disabled]="loading" />
        </div>

        <p class="text-xs text-slate-400">O preço de execução será o preço de mercado atual obtido via Finnhub.</p>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 px-5 py-4 border-t border-slate-100 dark:border-slate-700">
        <button
          class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-600 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          (click)="close()" [disabled]="loading">Cancelar</button>
        <button
          class="px-5 py-2 rounded-xl text-sm font-bold text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          [class]="isBuy ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-red-500 hover:bg-red-600'"
          [disabled]="loading || !ticker.trim() || quantity <= 0"
          (click)="submit()">
          <i class="bi bi-arrow-repeat animate-spin-slow me-1" *ngIf="loading"></i>
          {{ isBuy ? 'Executar Compra' : 'Executar Venda' }}
        </button>
      </div>

    </div>
  </div>
}
