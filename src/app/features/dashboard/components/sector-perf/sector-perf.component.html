<div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-card overflow-hidden">

  <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-700">
    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Setores S&P 500</span>
  </div>

  @if (loading) {
    <div class="px-5 py-3 space-y-3">
      @for (i of [1,2,3,4,5,6]; track i) {
        <div class="flex items-center gap-3">
          <div class="w-20 h-2 rounded bg-slate-100 dark:bg-slate-700 animate-pulse flex-shrink-0"></div>
          <div class="flex-1 h-2 rounded bg-slate-100 dark:bg-slate-700 animate-pulse"></div>
          <div class="w-12 h-2 rounded bg-slate-100 dark:bg-slate-700 animate-pulse flex-shrink-0"></div>
        </div>
      }
    </div>
  } @else {
    <div class="px-5 py-3 space-y-2.5">
      @for (s of sectors; track s.ticker) {
        <div class="flex items-center gap-3">
          <span class="w-[88px] text-[10px] font-semibold text-slate-500 dark:text-slate-400 truncate flex-shrink-0">{{ s.name }}</span>
          <div class="flex-1 h-2.5 rounded-full bg-slate-100 dark:bg-slate-700/60 overflow-hidden">
            <div
              class="h-full rounded-full transition-all duration-500"
              [class.bg-emerald-400]="s.changePercent >= 0"
              [class.bg-red-400]="s.changePercent < 0"
              [style.width.%]="barWidth(s.changePercent)">
            </div>
          </div>
          <span class="w-14 text-right text-[10px] font-bold tabular-nums flex-shrink-0"
            [class.text-emerald-500]="s.changePercent >= 0"
            [class.text-red-500]="s.changePercent < 0">
            {{ s.changePercent >= 0 ? '+' : '' }}{{ s.changePercent | number:'1.2-2' }}%
          </span>
        </div>
      }
      @if (!sectors.length) {
        <p class="text-xs text-center text-slate-400 py-4">Sem dados disponíveis.</p>
      }
    </div>
  }
</div>
