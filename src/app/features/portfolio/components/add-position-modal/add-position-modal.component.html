@if (open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in"
    (click)="close()">
    <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-modal animate-slide-up"
      (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-slate-700">
        <div>
          <h3 class="text-base font-bold text-slate-800 dark:text-slate-100">Adicionar Posição Histórica</h3>
          <p class="text-xs text-slate-400 mt-0.5">Registe uma compra a um preço histórico</p>
        </div>
        <button class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
          (click)="close()">
          <i class="bi bi-x-lg text-sm"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="p-5 grid grid-cols-2 gap-4">

        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Ticker *</label>
          <input
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border text-sm font-extrabold tracking-widest text-slate-800 dark:text-slate-100 placeholder-slate-400 outline-none uppercase transition-all"
            [class]="errors['ticker'] ? 'border-red-400' : 'border-transparent focus:border-brand-500'"
            placeholder="AAPL" [(ngModel)]="ticker" [disabled]="loading" />
          @if (errors['ticker']) { <p class="text-xs text-red-400 mt-1">{{ errors['ticker'] }}</p> }
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Empresa *</label>
          <input
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 outline-none transition-all"
            [class]="errors['company'] ? 'border-red-400' : 'border-transparent focus:border-brand-500'"
            placeholder="Apple Inc." [(ngModel)]="company" [disabled]="loading" />
          @if (errors['company']) { <p class="text-xs text-red-400 mt-1">{{ errors['company'] }}</p> }
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Quantidade *</label>
          <input type="number" min="1"
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border text-sm text-slate-800 dark:text-slate-100 outline-none transition-all"
            [class]="errors['quantity'] ? 'border-red-400' : 'border-transparent focus:border-brand-500'"
            [(ngModel)]="quantity" [disabled]="loading" />
          @if (errors['quantity']) { <p class="text-xs text-red-400 mt-1">{{ errors['quantity'] }}</p> }
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Preço de Compra *</label>
          <input type="number" min="0.01" step="0.01"
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border text-sm text-slate-800 dark:text-slate-100 outline-none transition-all"
            [class]="errors['price'] ? 'border-red-400' : 'border-transparent focus:border-brand-500'"
            [(ngModel)]="purchasePrice" [disabled]="loading" />
          @if (errors['price']) { <p class="text-xs text-red-400 mt-1">{{ errors['price'] }}</p> }
        </div>

        <div class="col-span-2">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Data de Aquisição</label>
          <input type="date"
            class="w-full h-10 px-3 rounded-xl bg-slate-100 dark:bg-slate-700 border border-transparent focus:border-brand-500 text-sm text-slate-800 dark:text-slate-100 outline-none transition-all"
            [(ngModel)]="acquiredAt" [disabled]="loading" />
        </div>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 px-5 py-4 border-t border-slate-100 dark:border-slate-700">
        <button class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-600 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          (click)="close()" [disabled]="loading">Cancelar</button>
        <button class="px-5 py-2 rounded-xl bg-brand-500 hover:bg-brand-600 text-sm font-bold text-white transition-colors disabled:opacity-50"
          [disabled]="loading" (click)="submit()">
          <i class="bi bi-arrow-repeat animate-spin-slow me-1" *ngIf="loading"></i>
          Adicionar Posição
        </button>
      </div>
    </div>
  </div>
}
